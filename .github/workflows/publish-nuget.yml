name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package, validate, and publish
    runs-on: ubuntu-latest
    environment: nuget

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet/STS2.Live2D.Package.csproj', 'Live2D.csproj') }}

      - name: Verify tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's|^[[:space:]]*<Version>([^<]+)</Version>[[:space:]]*$|\1|p' NuGet/STS2.Live2D.Package.csproj | head -n 1)"
          if [[ -z "$version" ]]; then
            echo 'Could not read package version.' >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Package committed reference assets
        shell: bash
        run: >-
          dotnet pack NuGet/STS2.Live2D.Package.csproj
          --configuration Release
          --output artifacts
          -p:PackageVersion="${{ steps.version.outputs.value }}"

      - name: Test package consumption
        shell: bash
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/live2d-nuget-cache
        run: |
          set -euo pipefail
          package="artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg"
          entries="$(unzip -Z1 "$package")"
          grep -qx 'ref/net9.0/Live2D.dll' <<<"$entries"
          grep -qx 'ref/net9.0/Live2D.xml' <<<"$entries"
          if grep -Eq '^(lib|runtimes)/' <<<"$entries"; then
            echo 'Runtime assets are not allowed in the ref-only package.' >&2
            exit 1
          fi
          consumer="${{ runner.temp }}/live2d-consumer"
          dotnet new classlib --name Consumer --output "$consumer" --framework net9.0
          dotnet add "$consumer/Consumer.csproj" package STS2.Live2D \
            --version "${{ steps.version.outputs.value }}" \
            --source "${{ github.workspace }}/artifacts" \
            --no-restore
          printf '%s\n' \
            'using Live2D.Api;' \
            'public static class ApiConsumer' \
            '{' \
            '    public static int Version => Live2DApi.RuntimeApiVersion;' \
            '}' > "$consumer/Class1.cs"
          dotnet restore "$consumer/Consumer.csproj" \
            --source "${{ github.workspace }}/artifacts" \
            --source https://api.nuget.org/v3/index.json
          dotnet build "$consumer/Consumer.csproj" --configuration Release --no-restore
          test ! -f "$consumer/bin/Release/net9.0/Live2D.dll"

      - name: Upload validated package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: STS2.Live2D.${{ steps.version.outputs.value }}
          path: artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Log in to nuget.org with OIDC
        id: login
        uses: NuGet/login@v1
        with:
          user: LingkongSky

      - name: Publish package
        shell: bash
        run: >-
          dotnet nuget push
          "artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
