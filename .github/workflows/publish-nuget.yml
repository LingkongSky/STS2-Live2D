name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Package, validate, and publish
    runs-on: ubuntu-latest
    environment: nuget

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('NuGet/STS2.Live2D.Package.csproj', 'Live2D.csproj') }}

      - name: Verify tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -nE 's|^[[:space:]]*<Version>([^<]+)</Version>[[:space:]]*$|\1|p' NuGet/STS2.Live2D.Package.csproj | head -n 1)"
          if [[ -z "$version" ]]; then
            echo 'Could not read package version.' >&2
            exit 1
          fi
          if [[ "$GITHUB_REF_NAME" != "v$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $version" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Package committed reference assets
        shell: pwsh
        run: >-
          ./Tools/pack-nuget.ps1
          -OutputDirectory "${{ github.workspace }}/artifacts"
          -RequireClean

      - name: Test package consumption
        shell: pwsh
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/live2d-nuget-cache
        run: >-
          ./Tools/test-nuget-package.ps1
          -PackagePath "artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg"
          -ExpectedVersion "${{ steps.version.outputs.value }}"

      - name: Upload validated package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: STS2.Live2D.${{ steps.version.outputs.value }}
          path: artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg
          if-no-files-found: error
          retention-days: 30

      - name: Log in to nuget.org with OIDC
        id: login
        uses: NuGet/login@v1
        with:
          user: LingkongSky

      - name: Publish package
        shell: bash
        run: >-
          dotnet nuget push
          "artifacts/STS2.Live2D.${{ steps.version.outputs.value }}.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
